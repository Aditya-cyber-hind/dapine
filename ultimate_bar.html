<!DOCTYPE html>
<html>
<head>
    <title>Dapine Chart - chart</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #16213e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 80%;
            max-width: 900px;
        }
        h1 {
            text-align: center;
            color: #e94560;
            margin-bottom: 30px;
        }
        canvas {
            max-height: 500px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 chart</h1>
        <canvas id="chart"></canvas>
        <div class="footer">Generated by Dapine 🚀</div>
    </div>
    <script>
        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: [],
                datasets: [{
                    label: 'total_homes',
                    data: [],
                    backgroundColor: [],
                    borderColor: [],
                    borderWidth: 2,
                    borderRadius: 5,
                    hoverBorderWidth: 3,
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        labels: { color: 'white', font: { size: 14 } }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: { color: '#ccc' },
                        grid: { color: '#333' }
                    },
                    x: {
                        ticks: { color: '#ccc' },
                        grid: { color: '#333' }
                    }
                }
            }
        });
    </script>
</body>
</html>
